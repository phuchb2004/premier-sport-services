name: Backend CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        run: mvn clean verify -pl common-lib,user-service,product-service,order-service --batch-mode
        env:
          MONGODB_URI: mongodb://localhost:27017/premier-sport-test
          JWT_SECRET: test-jwt-secret-key-must-be-at-least-32-chars

      - name: Build API Gateway
        run: mvn clean package -pl api-gateway --batch-mode -DskipTests
