server:
  port: 8081

spring:
  application:
    name: user-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/premier-sport-dev}
      database: ${MONGODB_DATABASE:premier-sport-dev}
      auto-index-creation: false

jwt:
  secret: ${JWT_SECRET:premier-sport-jwt-secret-key-must-be-at-least-32-characters}
  expiration: ${JWT_EXPIRATION:86400000}

google:
  client-id: ${GOOGLE_CLIENT_ID}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.premiersport: DEBUG
    org.springframework.security: INFO
