version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: premier-sport-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: premier-sport-dev
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      USER_SERVICE_URL: http://user-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
      CHATBOT_SERVICE_URL: http://chatbot-service:8084
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - user-service
      - product-service
      - order-service

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/premier-sport-dev
      JWT_SECRET: ${JWT_SECRET:-premier-sport-jwt-secret-key-must-be-at-least-32-characters}
    depends_on:
      mongodb:
        condition: service_healthy

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: product-service
    ports:
      - "8082:8082"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/premier-sport-dev
      JWT_SECRET: ${JWT_SECRET:-premier-sport-jwt-secret-key-must-be-at-least-32-characters}
    depends_on:
      mongodb:
        condition: service_healthy

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/premier-sport-dev
      JWT_SECRET: ${JWT_SECRET:-premier-sport-jwt-secret-key-must-be-at-least-32-characters}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
    depends_on:
      mongodb:
        condition: service_healthy

  chatbot-service:
    build:
      context: .
      dockerfile: chatbot-service/Dockerfile
    container_name: chatbot-service
    ports:
      - "8084:8084"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/premier-sport-dev
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      PRODUCT_SERVICE_URL: http://product-service:8082
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo-data:
