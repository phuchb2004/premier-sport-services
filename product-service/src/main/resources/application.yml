server:
  port: 8082

spring:
  application:
    name: product-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/premier-sport-dev}
      database: ${MONGODB_DATABASE:premier-sport-dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

jwt:
  secret: ${JWT_SECRET:premier-sport-jwt-secret-key-must-be-at-least-32-characters}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET:premier-sport-images}
    region: ${AWS_REGION:eu-west-1}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.premiersport: DEBUG
